<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Limb Darkening Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    canvas {
      border: 1px solid #444;
      margin-top: 20px;
      background: black;
    }

    .controls {
      margin-top: 20px;
    }

    label {
      display: inline-block;
      width: 120px;
      text-align: right;
      margin-right: 10px;
    }

    input[type="range"] {
      width: 250px;
    }

    .row {
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <h1>Stellar Limb Darkening</h1>
  <p>Quadratic limb-darkening model</p>

  <div class="controls">
    <div class="row">
      <label for="u1">u₁:</label>
      <input type="range" id="u1" min="0" max="1" step="0.01" value="0.4">
      <span id="u1val">0.40</span>
    </div>
    <div class="row">
      <label for="u2">u₂:</label>
      <input type="range" id="u2" min="0" max="1" step="0.01" value="0.25">
      <span id="u2val">0.25</span>
    </div>
  </div>

  <canvas id="starCanvas" width="500" height="500"></canvas>

  <script>
    const canvas = document.getElementById("starCanvas");
    const ctx = canvas.getContext("2d");

    const u1Slider = document.getElementById("u1");
    const u2Slider = document.getElementById("u2");
    const u1Val = document.getElementById("u1val");
    const u2Val = document.getElementById("u2val");

    function limbDarkeningIntensity(mu, u1, u2) {
      return 1 - u1 * (1 - mu) - u2 * Math.pow(1 - mu, 2);
    }

    function drawStar(u1, u2) {
      const width = canvas.width;
      const height = canvas.height;
      const cx = width / 2;
      const cy = height / 2;
      const R = 200;

      const image = ctx.createImageData(width, height);
      const data = image.data;

      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const dx = (x - cx) / R;
          const dy = (y - cy) / R;
          const r2 = dx * dx + dy * dy;
          const idx = 4 * (y * width + x);

          if (r2 <= 1) {
            const mu = Math.sqrt(1 - r2);
            let I = limbDarkeningIntensity(mu, u1, u2);

            I = Math.max(0, Math.min(1, I));

            const value = Math.floor(255 * I);

            data[idx] = value;       // R
            data[idx + 1] = value;   // G
            data[idx + 2] = value;   // B
            data[idx + 3] = 255;     // A
          } else {
            data[idx] = 0;
            data[idx + 1] = 0;
            data[idx + 2] = 0;
            data[idx + 3] = 255;
          }
        }
      }

      ctx.putImageData(image, 0, 0);

      ctx.beginPath();
      ctx.arc(cx, cy, R, 0, 2 * Math.PI);
      ctx.strokeStyle = "#666";
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    function update() {
      const u1 = parseFloat(u1Slider.value);
      const u2 = parseFloat(u2Slider.value);

      u1Val.textContent = u1.toFixed(2);
      u2Val.textContent = u2.toFixed(2);

      drawStar(u1, u2);
    }

    u1Slider.addEventListener("input", update);
    u2Slider.addEventListener("input", update);

    update();
  </script>
</body>
</html>
